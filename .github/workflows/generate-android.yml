name: Generate Android project

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install React Native CLI
        run: |
          npm install -g react-native-cli

      - name: Init temporary RN project
        run: |
          npx react-native init tempapp --version 0.72.0

      - name: Move android folder into repo
        run: |
          rm -rf mobile/android || true
          mkdir -p mobile
          mv tempapp/android mobile/
          rm -rf tempapp
          ls -la mobile/android || true

      - name: Commit android folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mobile/android
          git commit -m "chore: add generated Android native project" || echo "no changes to commit"
          git push origin HEAD:main || echo "push failed"
