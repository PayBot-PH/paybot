name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "8.10.0"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate Railway token
        id: validate
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not set. Skipping deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$RAILWAY_SERVICE" ]; then
            echo "::warning::RAILWAY_SERVICE secret is not set. Skipping deployment. Set RAILWAY_SERVICE to the exact Railway service name. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

      - name: Install Railway CLI
        if: steps.validate.outputs.has_token == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.validate.outputs.has_token == 'true'
        run: |
          set -euo pipefail
          ARGS=(up --ci)
          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          railway "${ARGS[@]}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - name: Validate Render deploy hook
        id: validate
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set. Skipping Render deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_hook=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_hook=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Trigger Render deploy
        if: steps.validate.outputs.has_hook == 'true'
        run: curl -s --fail-with-body -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        id: validate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not set. Skipping Cloudflare Pages deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID secret is not set. Skipping Cloudflare Pages deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Install pnpm
        if: steps.validate.outputs.has_credentials == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: "8.10.0"

      - name: Set up Node.js 20
        if: steps.validate.outputs.has_credentials == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.validate.outputs.has_credentials == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: steps.validate.outputs.has_credentials == 'true'
        working-directory: frontend
        run: pnpm run build

      - name: Deploy to Cloudflare Pages
        if: steps.validate.outputs.has_credentials == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: frontend
          command: pages deploy dist --project-name=${{ secrets.CLOUDFLARE_PROJECT_NAME || 'paybot' }} --branch=main --commit-dirty=true

  deploy-cloudflare-worker:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        id: validate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not set. Skipping Cloudflare Workers deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::warning::CLOUDFLARE_ACCOUNT_ID secret is not set. Skipping Cloudflare Workers deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$CLOUDFLARE_WORKERS_NAME" ]; then
            echo "::warning::CLOUDFLARE_WORKERS_NAME secret is not set. Skipping Cloudflare Workers deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKERS_NAME: ${{ secrets.CLOUDFLARE_WORKERS_NAME }}

      - name: Install pnpm
        if: steps.validate.outputs.has_credentials == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: "8.10.0"

      - name: Set up Node.js 20
        if: steps.validate.outputs.has_credentials == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install root dependencies (wrangler)
        if: steps.validate.outputs.has_credentials == 'true'
        # Root package.json uses npm (not pnpm); wrangler lives here
        run: npm ci

      - name: Install frontend dependencies
        if: steps.validate.outputs.has_credentials == 'true'
        # Frontend uses pnpm (see frontend/pnpm-lock.yaml)
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        if: steps.validate.outputs.has_credentials == 'true'
        working-directory: frontend
        run: pnpm run build

      - name: Deploy to Cloudflare Workers
        if: steps.validate.outputs.has_credentials == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=${{ secrets.CLOUDFLARE_WORKERS_NAME }}
