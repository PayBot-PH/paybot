name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "8.10.0"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate Railway token
        id: validate
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not set. Skipping deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$RAILWAY_SERVICE" ]; then
            echo "::warning::RAILWAY_SERVICE secret is not set. Skipping deployment. Set RAILWAY_SERVICE to the exact Railway service name. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

      - name: Install Railway CLI
        if: steps.validate.outputs.has_token == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.validate.outputs.has_token == 'true'
        run: |
          set -euo pipefail
          ARGS=(up --ci)
          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          railway "${ARGS[@]}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - name: Validate Render deploy hook
        id: validate
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set. Skipping Render deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_hook=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_hook=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$RENDER_API_KEY" ]; then
            echo "has_api_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_api_key=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

      - name: Trigger Render deploy and monitor
        if: steps.validate.outputs.has_hook == 'true'
        run: |
          set -euo pipefail

          # Trigger the deploy and capture the response
          RESPONSE=$(curl -s --fail-with-body -X POST "$RENDER_DEPLOY_HOOK_URL")
          echo "Deploy triggered: $RESPONSE"

          # Extract deploy/service IDs from the response if Render API key is available for monitoring
          if [ "$HAS_API_KEY" = "true" ] && command -v python3 &>/dev/null; then
            read -r DEPLOY_ID SERVICE_ID <<< "$(echo "$RESPONSE" | python3 - <<'PY'
import json
import re
import sys

raw = sys.stdin.read().strip()
# Render IDs are typically longer than a handful of characters; use a minimum
# length heuristic (6+) to avoid short accidental matches in log text while
# remaining flexible if Render adjusts their ID format.
MIN_ID_LENGTH = 6
service_id_pattern = re.compile(rf"srv-[A-Za-z0-9]{{{MIN_ID_LENGTH},}}")
deploy_id_pattern = re.compile(rf"dep-[A-Za-z0-9]{{{MIN_ID_LENGTH},}}")

try:
    data = json.loads(raw) if raw else {}
except json.JSONDecodeError:
    data = {}

def first_value(mapping, *keys):
    # Expects flat string/int values; nested dictionaries are ignored.
    if not isinstance(mapping, dict):
        return ""
    for key in keys:
        if key not in mapping or mapping[key] is None:
            continue
        raw_value = mapping[key]
        if isinstance(raw_value, (str, int)):
            value = str(raw_value).strip()
            if value:
                return value
    return ""

def validate_id(value, pattern):
    if not value:
        return ""
    return value if pattern.fullmatch(str(value)) else ""

def extract_ids(payload):
    if not isinstance(payload, dict):
        return "", ""
    deploy = payload.get("deploy")
    deploy_id = first_value(deploy, "id", "deployId", "deploy_id")
    service = deploy.get("service") if isinstance(deploy, dict) else {}
    service_id = first_value(service, "id", "serviceId", "service_id")
    deploy_id = deploy_id or first_value(payload, "deployId", "deploy_id", "id")
    service_id = service_id or first_value(payload, "serviceId", "service_id")
    return deploy_id, service_id

deploy_id, service_id = extract_ids(data)
deploy_id = validate_id(deploy_id, deploy_id_pattern)
service_id = validate_id(service_id, service_id_pattern)

if not service_id:
    match = service_id_pattern.search(raw)
    if match:
        service_id = match.group(0)
if not deploy_id:
    match = deploy_id_pattern.search(raw)
    if match:
        deploy_id = match.group(0)

print(deploy_id, service_id)
PY
)"
            if [ -z "$SERVICE_ID" ]; then
              SERVICE_ID=$(echo "$RENDER_DEPLOY_HOOK_URL" | sed -n 's|.*/deploy/\([^?]*\).*|\1|p' || echo "")
            fi

            if [ -n "$DEPLOY_ID" ] && [ -n "$SERVICE_ID" ]; then
              echo "Monitoring deploy $DEPLOY_ID on service $SERVICE_ID..."
              parse_status() {
                python3 - <<'PY'
import json
import sys

try:
    payload = json.load(sys.stdin)
except Exception:
    print("unknown")
    raise SystemExit(0)

if isinstance(payload, dict):
    print(payload.get("status", "unknown"))
else:
    print("unknown")
PY
              }
              MAX_WAIT=600  # 10 minutes
              ELAPSED=0
              INTERVAL=15
              while [ $ELAPSED -lt $MAX_WAIT ]; do
                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                STATUS_RESPONSE=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
                  "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" 2>/dev/null || echo '{"status":"unknown"}')
                STATUS=$(echo "$STATUS_RESPONSE" | parse_status)
                if [ "$STATUS" = "unknown" ]; then
                  STATUS_RESPONSE=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
                    "https://api.render.com/v1/deploys/$DEPLOY_ID" 2>/dev/null || echo '{"status":"unknown"}')
                  STATUS=$(echo "$STATUS_RESPONSE" | parse_status)
                fi
                echo "[$ELAPSED s] Deploy status: $STATUS"
                if [ "$STATUS" = "live" ]; then
                  echo "✅ Render deployment succeeded (status: live)"
                  break
                elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "update_failed" ] || [ "$STATUS" = "canceled" ]; then
                  echo "❌ Render deployment failed (status: $STATUS)"
                  # Fetch last 100 lines of deploy logs
                  LOGS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
                    "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID/logs?limit=100" 2>/dev/null || echo "[]")
                  echo "--- Deploy logs ---"
                  echo "$LOGS" | python3 -c "
          import sys, json
          raw = sys.stdin.read()
          try:
              logs = json.loads(raw)
              if isinstance(logs, list):
                  for entry in logs:
                      print(entry.get('text', entry))
              else:
                  print(raw)
          except json.JSONDecodeError:
              print('(raw log response):', raw[:2000])
          " 2>&1
                  exit 1
                fi
              done
              if [ $ELAPSED -ge $MAX_WAIT ]; then
                echo "⚠️ Timed out waiting for Render deployment after ${MAX_WAIT}s (last status: $STATUS)"
              fi
            else
              echo "ℹ️ Could not extract deploy/service ID — skipping status monitoring"
            fi
          else
            echo "ℹ️ RENDER_API_KEY not set — deploy triggered but not monitored. Set RENDER_API_KEY secret for status monitoring."
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          HAS_API_KEY: ${{ steps.validate.outputs.has_api_key }}
