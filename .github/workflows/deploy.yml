name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "8.10.0"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Lint
        working-directory: frontend
        run: pnpm run lint

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Validate Railway token
        id: validate
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not set. Skipping deployment. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$RAILWAY_SERVICE" ]; then
            echo "::warning::RAILWAY_SERVICE secret is not set. Skipping deployment. Set RAILWAY_SERVICE to the exact Railway service name. See DEPLOYMENT.md for setup instructions."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

      - name: Install Railway CLI
        if: steps.validate.outputs.has_token == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.validate.outputs.has_token == 'true'
        run: |
          set -euo pipefail
          ARGS=(up --ci --detach)
          if [ -n "${RAILWAY_SERVICE:-}" ]; then
            ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          railway "${ARGS[@]}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
