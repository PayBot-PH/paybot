name: CI

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: "sqlite+aiosqlite:////tmp/test_paybot_ci.db"
          JWT_SECRET_KEY: "ci-test-secret-key"
          ADMIN_USER_PASSWORD: "testpass123"
          TELEGRAM_ADMIN_IDS: "test_admin"
        run: pytest tests/ -v
