<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Blue square background -->
  <rect width="100" height="100" fill="#2872E4"/>
  <!-- Antenna: vertical line up then horizontal right -->
  <path d="M54 27 L54 17 L65 17" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Robot outer body: thick rounded rectangle -->
  <rect x="16" y="27" width="68" height="52" rx="13" fill="none" stroke="white" stroke-width="6"/>
  <!-- Left ear protrusion -->
  <path d="M16 46 L8 46 L8 56 L16 56" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right ear protrusion -->
  <path d="M84 46 L92 46 L92 56 L84 56" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left eye: vertical pill -->
  <rect x="30" y="39" width="14" height="24" rx="7" fill="white"/>
  <!-- Right eye: vertical pill -->
  <rect x="56" y="39" width="14" height="24" rx="7" fill="white"/>
</svg>
